services:
  db:
    image: postgres:16-alpine
    container_name: cesizen-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cesizen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cesizen-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: cesizen-backend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - CI=true
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/cesizen
    networks:
      - cesizen-network

  db-test:
    image: postgres:16-alpine
    container_name: cesizen-db-test
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cesizen_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cesizen-network

networks:
  cesizen-network:
    driver: bridge

volumes:
  postgres_data:
  postgres_test_data:
